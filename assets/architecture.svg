  <g stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)">
    <line x1="210" y1="190" x2="250" y2="190"/>
    <line x1="420" y1="190" x2="460" y2="190"/>
    <line x1="630" y1="190" x2="670" y2="190"/>
    <line x1="840" y1="190" x2="880" y2="190"/>
    <line x1="965" y1="230" x2="640" y2="300"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
