  <g font-family="Arial" font-size="18" fill="#ffffff">
    <rect x="40" y="150" width="170" height="80" rx="18" fill="#1e293b" stroke="#38bdf8"/>
    <text x="125" y="185" text-anchor="middle">Product</text>
    <text x="125" y="210" text-anchor="middle">Input</text>

    <rect x="250" y="150" width="170" height="80" rx="18" fill="#1e293b" stroke="#38bdf8"/>
    <text x="335" y="185" text-anchor="middle">Insight</text>
    <text x="335" y="210" text-anchor="middle">Agent</text>

    <rect x="460" y="150" width="170" height="80" rx="18" fill="#1e293b" stroke="#38bdf8"/>
    <text x="545" y="185" text-anchor="middle">Script</text>
    <text x="545" y="210" text-anchor="middle">Agent</text>

    <rect x="670" y="150" width="170" height="80" rx="18" fill="#1e293b" stroke="#38bdf8"/>
    <text x="755" y="185" text-anchor="middle">Prompt</text>
    <text x="755" y="210" text-anchor="middle">Agent</text>

    <rect x="880" y="150" width="170" height="80" rx="18" fill="#1e293b" stroke="#38bdf8"/>
